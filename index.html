<style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; line-height: 1.6; }
    label { display: block; margin: 15px 0 5px; font-weight: bold; }
    input, select, button { padding: 12px; width: 100%; font-size: 16px; margin-bottom: 10px; }
    button { background: #0066cc; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; }
    #result { margin-top: 20px; padding: 15px; background: #f0f8ff; border-radius: 6px; font-size: 18px; }
</style>
</head>
<body>
    <h1>Manitou Incline Time Estimator</h1>
    <p>Based on real hiker data • Submissions shared across all devices</p>

    <label>Fitness Level:
        <select id="fitness">
            <option value="casual">Casual</option>
            <option value="moderate">Moderate</option>
            <option value="fit">Fit</option>
            <option value="inactive">Inactive / Health Issues</option>
        </select>
    </label>

    <label>Home Elevation (feet): <input type="number" id="elevation" value="6000"></label>
    <label>Age: <input type="number" id="age" value="35"></label>

    <button onclick="calculateTime()">Estimate My Time</button>

    <div id="result"></div>

    <script>
        async function calculateTime() {
            const fitness = document.getElementById('fitness').value;
            const elevation = parseInt(document.getElementById('elevation').value) || 6000;
            const age = parseInt(document.getElementById('age').value) || 35;

            let minutes = 55;
            if (fitness === "inactive") minutes += 35;
            else if (fitness === "casual") minutes += 15;
            else if (fitness === "fit") minutes -= 12;

            if (elevation > 7000) minutes -= 5;
            if (age > 50) minutes += 8;

            document.getElementById('result').innerHTML = `
                <strong>Estimated summit time: ${Math.round(minutes)} minutes</strong><br><br>
                <small>✅ Shared database active</small>
            `;
        }
    </script>
</body>
